<!DOCTYPE html>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #007bff;
            color: white;
            padding: 20px;
            margin: 0;
            font-size: 2em;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .category-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-item {
            text-align: center;
            width: 120px;
        }

        .category-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 5px;
            transition: transform 0.2s;
        }

        .category-image:hover {
            transform: scale(1.1);
        }

        input[type="radio"] {
            display: none;
        }

        label {
            cursor: pointer;
            display: inline-block;
            text-align: center;
        }

        input[type="text"], input[type="number"], textarea {
            width: calc(100% - 40px);
            padding: 12px;
            margin: 10px auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[type="submit"], button {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }

        input[type="submit"]:hover, button:hover {
            background-color: #218838;
        }

        button {
            background-color: #007bff;
        }

        button:hover {
            background-color: #0056b3;
        }

        .view-more {
            margin-top: 20px;
            display: inline-block;
        }
    </style>
    </style>
    <script>
        function updateSymptoms() {
            var category = document.querySelector('select[name="category"]').value;
            var symptomsSelect = document.getElementById('symptoms');
    
            symptomsSelect.innerHTML = ''; // Clear existing options
    
            if (category) {
                // Fetch symptoms data from the server based on the selected category
                fetch(`/symptoms?category=${category}`)
                    .then(response => response.json())
                    .then(data => {
                        data.forEach(function(symptom) {
                            var option = document.createElement('option');
                            option.value = symptom;
                            option.textContent = symptom;
                            symptomsSelect.appendChild(option);
                        });
                    })
                    .catch(error => console.error('Error:', error));
            }
        }
    
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('select[name="category"]').addEventListener('change', updateSymptoms);
    
            // Initialize symptoms on page load if a category is pre-selected
            updateSymptoms();
        });
    </script>
    
</head>
